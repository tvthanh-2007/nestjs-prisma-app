version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: nestjs_prisma_app_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestjs_prisma_app
    ports:
      - '5435:5432'
    volumes:
      - nestjs_prisma_app_data:/var/lib/postgresql/data
  app:
    build: .
    command: sh -c "pnpm prisma migrate deploy && pnpm start:dev"
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    env_file:
      - .env

volumes:
  nestjs_prisma_app_data:
